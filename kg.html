<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kilroid & Glitch LIVE</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
    color: white;
}

/* SCENE */
.scene {
    width: 100vw;
    height: 100vh;
    background: url('/mnt/data/0.png') center/cover no-repeat;
    position: relative;
}

/* LIGHT PARTICLES */
.particle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: #00f0ff;
    border-radius: 50%;
    animation: float 6s infinite linear;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 0; }
    to { transform: translateY(-10vh); opacity: 1; }
}

/* BALL */
.ball {
    position: absolute;
    bottom: 80px;
    right: 120px;
    width: 80px;
    animation: bounce 1s infinite;
}

@keyframes bounce {
    0% { transform: translateY(0); }
    50% { transform: translateY(-120px); }
    100% { transform: translateY(0); }
}

/* TITLE */
.title {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 3em;
    color: #00f0ff;
    text-shadow: 0 0 20px #00f0ff;
}

/* SPEECH */
.speech {
    position: absolute;
    background: white;
    color: black;
    padding: 12px;
    border-radius: 12px;
    max-width: 240px;
    font-weight: bold;
}

#kSpeech { left: 8%; bottom: 250px; }
#gSpeech { right: 8%; bottom: 280px; }

/* CHAT */
.chatbox {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.8);
    padding: 10px;
    display: flex;
}

.chatbox input {
    flex: 1;
    padding: 10px;
}

.chatbox button {
    padding: 10px;
    background: #00f0ff;
    border: none;
}

/* BUTTONS */
.controls {
    position: absolute;
    top: 70px;
    right: 20px;
}

.controls button {
    display: block;
    margin: 5px;
    padding: 10px;
}
</style>
</head>

<body>

<div class="scene" id="scene">

    <div class="title">Kilroid & Glitch</div>

    <!-- BALL -->
    <img class="ball" src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Basketball.png">

    <!-- SPEECH -->
    <div id="kSpeech" class="speech">...</div>
    <div id="gSpeech" class="speech">...</div>

    <!-- CONTROLS -->
    <div class="controls">
        <button onclick="toggleMusic()">🎵 Music</button>
        <button onclick="listen()">🎤 Talk</button>
    </div>

    <!-- CHAT -->
    <div class="chatbox">
        <input id="input" placeholder="Talk to Kilroid & Glitch...">
        <button onclick="talk()">Send</button>
    </div>

</div>

<script>

/* PARTICLES */
for(let i=0;i<40;i++){
    let p = document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(3+Math.random()*5)+"s";
    document.getElementById("scene").appendChild(p);
}

/* VOICES */
function speak(character, text){
    let box = character==="k" ? kSpeech : gSpeech;
    box.innerText=text;

    let msg = new SpeechSynthesisUtterance(text);

    if(character==="k"){
        msg.pitch=1.4;
        msg.rate=1.1;
    } else {
        msg.pitch=0.7;
        msg.rate=0.9;
    }

    speechSynthesis.speak(msg);
}

/* INTRO */
window.onload = () => {

    setTimeout(()=>speak("k","Yo! Hold up—somebody just pulled up!"),500);
    setTimeout(()=>speak("g","Scanning... human presence confirmed."),2000);
    setTimeout(()=>speak("k","You trying to hoop or learn something cool?"),3500);

};

/* SMART RESPONSE SYSTEM */
function respond(input){

    if(input.includes("play")||input.includes("game")){
        speak("k","Say less! Let’s run it!");
        speak("g","Game mode initialized.");
    }
    else if(input.includes("learn")||input.includes("help")){
        speak("g","Educational mode activated.");
        speak("k","We got you, no stress!");
    }
    else if(input.includes("sad")||input.includes("mad")){
        speak("g","Emotion detected.");
        speak("k","Hey… we right here with you.");
    }
    else{
        let random = [
            "Wait… run that back?",
            "Processing... kinda confused.",
            "Try saying that different."
        ];
        speak("k",random[Math.floor(Math.random()*random.length)]);
    }
}

/* CHAT */
function talk(){
    let input = document.getElementById("input").value.toLowerCase();
    if(!input) return;
    respond(input);
    document.getElementById("input").value="";
}

/* VOICE INPUT */
function listen(){
    let rec = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.onresult = e=>{
        let text=e.results[0][0].transcript.toLowerCase();
        respond(text);
    };
    rec.start();
}

/* MUSIC */
let audio = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
audio.loop=true;

function toggleMusic(){
    if(audio.paused) audio.play();
    else audio.pause();
}

/* RANDOM LIFE CHAT */
setInterval(()=>{
    let lines = [
        ["k","I think I just leveled up."],
        ["g","System recalibrating..."],
        ["k","Yo glitch you saw that shot??"],
        ["g","Probability: impressive."]
    ];
    let l=lines[Math.floor(Math.random()*lines.length)];
    speak(l[0],l[1]);
},15000);

</script>

</body>
</html>
